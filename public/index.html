<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SA Feedback</title><style>body{font-family:Segoe UI,Arial;background:#f4f7fb;margin:0}.head{background:#155eef;color:white;padding:20px;text-align:center}.wrap{max-width:1100px;margin:15px auto;padding:10px}.card{background:white;border:1px solid #ddd;border-radius:12px;padding:15px;margin:10px 0}.btn{background:#155eef;color:white;border:0;border-radius:8px;padding:10px 14px;font-weight:bold;margin:4px}.green{background:#087443}.red{background:#b42318}.amber{background:#b54708}.grey{background:#e5e7eb;color:#111}.hidden{display:none}.msg{padding:10px;background:#eef6ff;margin-top:10px;border-radius:8px;white-space:pre-wrap}.err{background:#fef2f2;color:#b42318}.ok{background:#ecfdf5;color:#047857}input,select,textarea{width:100%;padding:10px;margin:4px 0;border:1px solid #ccc;border-radius:8px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.task{border:1px solid #ddd;border-radius:10px;padding:12px;margin:10px 0}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.field{background:#f8fafc;padding:8px;border-radius:8px}@media(max-width:800px){.row,.grid{grid-template-columns:1fr}}</style></head><body><div class="head"><h2>SA Owner Pending Feedback</h2></div><div class="wrap"><button class="btn grey" onclick="toggleAdmin()">Admin Panel</button><div id="admin" class="card hidden"><h3>Admin</h3><div class="row"><div><label>Admin PIN</label><input id="pin" type="password" placeholder="Default 1234"></div><div><label>Batch Date</label><input id="batch" type="date"></div></div><label>Raw CSV</label><input id="csv" type="file" accept=".csv"><button class="btn amber" onclick="processCsv()">1. Process CSV</button><button class="btn green" onclick="uploadTasks()">2. Upload / Replace Daily Tasks</button><button class="btn" onclick="testBackend()">Test Backend</button><button class="btn" onclick="downloadFeedback()">Download Feedback CSV</button><button class="btn red" onclick="clearFeedback()">Clear Feedback</button><button class="btn red" onclick="clearAll()">Clear All</button><div id="adminMsg" class="msg hidden"></div></div><div class="card"><h3>SA Owner</h3><button class="btn" onclick="loadTasks()">Refresh Pending Tasks</button><div id="loadMsg" class="msg hidden"></div><div class="row"><div><label>Select SA Owner</label><select id="owner" onchange="render()"><option value="">Select</option></select></div><div><label>Search</label><input id="search" oninput="render()"></div></div></div><div id="tasks"></div><div id="bar" class="card hidden"><button class="btn grey" onclick="saveDraft()">Save Draft</button><button class="btn green" onclick="submitFeedback()">Submit Feedback</button></div></div><script>var API='/.netlify/functions/';var TARGET_WORKTYPE='maintenance-meter related';var TARGET_STATUSES=['dispatched','open','onsite'];var filtered=[];var tasks=[];var draft=JSON.parse(localStorage.getItem('sa_draft')||'{}');function el(id){return document.getElementById(id);}function clean(v){return String(v==null?'':v).trim().replace(/\s+/g,' ');}function low(v){return clean(v).toLowerCase();}function msg(id,t,cls){var e=el(id);e.textContent=t;e.className='msg '+(cls||'');e.classList.remove('hidden');}function toggleAdmin(){el('admin').classList.toggle('hidden');}el('batch').value=new Date().toISOString().slice(0,10);function key(r){return clean(r['Appointment Number'])||clean(r['Work Order Number']);}async function readRes(res){var text=await res.text();var data;try{data=JSON.parse(text);}catch(e){throw new Error('Backend returned non JSON. Status '+res.status+'. '+text.slice(0,150));}if(!res.ok||data.ok===false){throw new Error(data.error||('Status '+res.status));}return data;}function headers(){return {'Content-Type':'application/json','x-admin-pin':el('pin').value};}async function postAdmin(name,body){var res=await fetch(API+name,{method:'POST',headers:headers(),body:JSON.stringify(body||{})});return await readRes(res);}async function postPublic(name,body){var res=await fetch(API+name,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});return await readRes(res);}function parseCSV(text){text=text.replace(/^\uFEFF/,'');var rows=[],row=[],cell='',q=false;for(var i=0;i<text.length;i++){var c=text[i],n=text[i+1];if(q){if(c==='"'&&n==='"'){cell+='"';i++;}else if(c==='"'){q=false;}else{cell+=c;}}else{if(c==='"'){q=true;}else if(c===','){row.push(cell);cell='';}else if(c==='\n'){row.push(cell);rows.push(row);row=[];cell='';}else if(c!=='\r'){cell+=c;}}}row.push(cell);rows.push(row);while(rows.length&&rows[rows.length-1].every(function(x){return clean(x)==='';})){rows.pop();}var h=rows[0].map(clean);return rows.slice(1).map(function(r){var o={};h.forEach(function(c,i){o[c]=r[i]||'';});return o;});}function statusCol(rows){return rows[0]&&rows[0].hasOwnProperty('Status.1')?'Status.1':'Status';}async function processCsv(){var f=el('csv').files[0];if(!f){alert('Select CSV');return;}var rows=parseCSV(await f.text());var st=statusCol(rows);filtered=[];for(var i=0;i<rows.length;i++){var r=rows[i];if(low(r['Work Type'])===TARGET_WORKTYPE&&TARGET_STATUSES.indexOf(low(r[st]))>=0){filtered.push({'Cluster ID':clean(r['Cluster ID']),'HHID':clean(r.HHID),'PMAID':clean(r.PMAID),'Work Order Number':clean(r['Work Order Number']),'SA Owner':clean(r['SA Owner']),'Appointment Number':clean(r['Appointment Number']),'Work Type':clean(r['Work Type']),'Task Status':clean(r[st]),'Batch Date':el('batch').value,'Feedback Status':'Pending'});}}msg('adminMsg','Processed '+rows.length+' rows. Filtered '+filtered.length+' pending tasks.','ok');}async function uploadTasks(){try{if(!filtered.length){alert('Process CSV first');return;}var d=await postAdmin('importTasks',{batchDate:el('batch').value,rows:filtered});msg('adminMsg','Uploaded '+d.imported+' tasks.','ok');loadTasks();}catch(e){msg('adminMsg','Upload failed:\n'+e.message,'err');}}async function testBackend(){try{var res=await fetch(API+'tasks');var d=await readRes(res);msg('adminMsg','Backend OK. Pending tasks: '+d.total,'ok');}catch(e){msg('adminMsg','Backend failed:\n'+e.message,'err');}}function downloadFeedback(){window.open(API+'exportFeedback?pin='+encodeURIComponent(el('pin').value),'_blank');}async function clearFeedback(){try{var d=await postAdmin('clearFeedback',{});msg('adminMsg',d.message,'ok');}catch(e){msg('adminMsg',e.message,'err');}}async function clearAll(){try{var d=await postAdmin('clearAll',{});msg('adminMsg',d.message,'ok');loadTasks();}catch(e){msg('adminMsg',e.message,'err');}}async function loadTasks(){try{var res=await fetch(API+'tasks?ts='+Date.now());var d=await readRes(res);tasks=d.rows||[];populateOwners();msg('loadMsg','Loaded '+tasks.length+' pending tasks.',tasks.length?'ok':'err');}catch(e){msg('loadMsg','Load failed:\n'+e.message,'err');}}function populateOwners(){var m={};tasks.forEach(function(x){var o=clean(x['SA Owner']);if(o)m[o]=true;});var arr=Object.keys(m).sort();el('owner').innerHTML='<option value="">Select</option>'+arr.map(function(o){return '<option value="'+o+'">'+o+'</option>';}).join('');}function ownerRows(){var owner=el('owner').value;var q=low(el('search').value);return tasks.filter(function(r){return clean(r['SA Owner'])===clean(owner);}).filter(function(r){return !q||['Cluster ID','HHID','PMAID','Work Order Number','Appointment Number'].some(function(c){return low(r[c]).indexOf(q)>=0;});});}function render(){var owner=el('owner').value;if(!owner){el('tasks').innerHTML='';el('bar').classList.add('hidden');return;}var rows=ownerRows();el('bar').classList.remove('hidden');el('tasks').innerHTML=rows.map(function(r,i){var f=draft[key(r)]||{};return '<div class="task" data-key="'+key(r)+'"><b>Task '+(i+1)+'</b><div class="grid"><div class="field">Cluster<br><b>'+clean(r['Cluster ID'])+'</b></div><div class="field">WO<br><b>'+clean(r['Work Order Number'])+'</b></div><div class="field">Appointment<br><b>'+clean(r['Appointment Number'])+'</b></div></div><div class="row"><div><label>Reason</label><textarea class="reason">'+(f.reason||'')+'</textarea></div><div><label>By which Date Connect</label><input type="date" class="date" value="'+(f.date||'')+'"></div></div></div>';}).join('');document.querySelectorAll('.reason,.date').forEach(function(e){e.onchange=saveDraft;});}function saveDraft(){document.querySelectorAll('.task').forEach(function(t){var reason=t.querySelector('.reason').value.trim();var date=t.querySelector('.date').value.trim();if(reason||date){draft[t.getAttribute('data-key')]={reason:reason,date:date};}else{delete draft[t.getAttribute('data-key')];}});localStorage.setItem('sa_draft',JSON.stringify(draft));}async function submitFeedback(){try{saveDraft();var rows=tasks.filter(function(r){return clean(r['SA Owner'])===clean(el('owner').value);});var payload=[];for(var i=0;i<rows.length;i++){var f=draft[key(rows[i])]||{};if(!f.reason||!f.date){alert('Fill all tasks before submit.');return;}payload.push({'Cluster ID':rows[i]['Cluster ID'],'HHID':rows[i].HHID,'PMAID':rows[i].PMAID,'Work Order Number':rows[i]['Work Order Number'],'SA Owner':rows[i]['SA Owner'],'Appointment Number':rows[i]['Appointment Number'],'Reason for Pending':f.reason,'By which Date Connect':f.date});}await postPublic('submitFeedback',{submittedAt:new Date().toISOString(),rows:payload});alert('Feedback submitted successfully.');rows.forEach(function(r){delete draft[key(r)];});localStorage.setItem('sa_draft',JSON.stringify(draft));loadTasks();el('owner').value='';render();}catch(e){alert('Submit failed: '+e.message);}}loadTasks();</script></body></html>
